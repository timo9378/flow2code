server {
    server_name flow2code.koimsurai.com;

    # Rate limiting for API routes (ts-morph compile/decompile are CPU-intensive)
    # Requires adding to /etc/nginx/nginx.conf http block:
    #   limit_req_zone $binary_remote_addr zone=flow2code_api:10m rate=5r/s;
    location /api/ {
        limit_req zone=flow2code_api burst=15 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3100;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests → Next.js standalone server
    location / {
        proxy_pass http://127.0.0.1:3100;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cloudflare headers
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        proxy_set_header CF-IPCountry $http_cf_ipcountry;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/koimsurai.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/koimsurai.com-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = flow2code.koimsurai.com) {
        return 301 https://$host$request_uri;
    }

    server_name flow2code.koimsurai.com;
    listen 80;
    return 404;
}
